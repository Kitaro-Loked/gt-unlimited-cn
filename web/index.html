<body class="dark-mode">
  <!-- Ambient Texture -->
  <div class="ambient-glow" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Ticker -->
  <header class="ticker-header" id="ticker-box" aria-label="市场行情滚动条"></header>

  <!-- Floating Top Bar -->
  <div class="top-bar-shell">
    <div class="top-bar">
      <div class="top-bar-left">
        <span class="terminal-id">
          <span class="terminal-pulse"></span>
          GT UNLIMITED
        </span>
        <div class="theme-shell">
          <button type="button" id="theme-icon" class="mode-toggle" aria-label="切换主题" aria-haspopup="true" aria-expanded="false">
            <span class="mode-icon">◐</span>
            <span class="mode-label">DARK MODE</span>
          </button>
          <nav class="theme-menu" id="theme-menu" aria-hidden="true">
            <div class="theme-menu-header">THEME</div>
            <div class="theme-menu-list" id="theme-menu-list"></div>
          </nav>
        </div>
      </div>
      <div id="clocks" class="clocks" aria-label="世界时钟"></div>
      <div class="system-hud" id="system-hud" aria-label="系统状态">
        <span class="hud-status" id="hud-status" title="连接状态">
          <span class="hud-dot"></span>
          <span class="hud-label">SYSTEM</span>
        </span>
        <span class="hud-latency" id="hud-latency" title="网络延迟">--ms</span>
        <span class="hud-flow" id="hud-flow" title="数据流活跃度">
          <span class="hud-flow-bar"></span>
          <span class="hud-flow-bar"></span>
          <span class="hud-flow-bar"></span>
        </span>
      </div>
    </div>
  </div>

  <!-- Main Workspace -->
  <main class="grid-container">
    <div class="grid-stack" role="region" aria-label="监控组件"></div>
  </main>

  <!-- Floating Widget Menu — unified launcher for widgets / workspaces / commands -->
  <button type="button" class="widget-menu-toggle" id="widget-menu-toggle" aria-label="添加组件 / 看板 / 命令" title="添加组件 / 看板 / 命令">
    <span class="widget-menu-icon"></span>
  </button>
  <nav class="widget-menu" id="widget-menu" aria-hidden="true">
    <div class="widget-menu-header">
      <div class="widget-menu-title">ADD WIDGET</div>
      <div class="widget-menu-tabs" role="tablist" aria-label="菜单标签">
        <button type="button" class="widget-menu-tab active" data-tab="widgets" role="tab" aria-selected="true">组件</button>
        <button type="button" class="widget-menu-tab" data-tab="workspaces" role="tab" aria-selected="false">看板</button>
        <button type="button" class="widget-menu-tab" data-tab="commands" role="tab" aria-selected="false">命令</button>
      </div>
    </div>
    <div class="widget-menu-search">
      <input type="text" id="widget-menu-search" placeholder="搜索组件 / 看板 / 命令..." autocomplete="off" aria-label="搜索">
    </div>
    <div class="widget-menu-body" id="widget-menu-body"></div>
  </nav>

  <!-- Workspace Toggle (floating, minimal when collapsed) -->
  <button type="button" class="workspace-toggle" id="workspace-toggle" aria-label="展开/收起看板" title="工作区看板 (Shift+W)">
    <span class="workspace-toggle-icon">▶</span>
  </button>

  <!-- Workspace Sidebar -->
  <aside class="workspace-sidebar" id="workspace-sidebar" aria-label="工作区看板">
    <div class="workspace-sidebar-inner">
      <div class="workspace-sidebar-header">
        <span>WORKSPACE</span>
        <span class="workspace-sidebar-sub">一键看板</span>
      </div>
      <div class="workspace-sidebar-list" id="workspace-sidebar-list"></div>
    </div>
  </aside>

  <!-- Command Palette -->
  <div class="command-palette" id="command-palette" aria-hidden="true">
    <div class="command-palette-box">
      <input type="text" id="command-input" placeholder="输入命令..." autocomplete="off">
      <div class="command-list" id="command-list"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
